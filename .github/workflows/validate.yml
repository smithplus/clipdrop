name: Validate ClipDrop

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run package:plugin
      - uses: actions/upload-artifact@v4
        with:
          name: ClipDrop-ccx
          path: dist/*.ccx
