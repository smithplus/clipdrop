<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClipDrop</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <main id="app" class="app-shell">
      <header class="app-header">
        <div>
          <h1>ClipDrop</h1>
          <p>Import from YouTube</p>
        </div>
        <div class="helper-status" title="ClipDrop Helper status">
          <span id="status-dot" class="status-dot is-checking"></span>
          <span id="helper-label">Checking</span>
        </div>
      </header>

      <section id="legal-notice" class="legal-notice" hidden>
        <p>
          Use this tool only with media you own or are authorized to download.
          It does not bypass DRM, paywalls, or private access.
        </p>
        <button id="accept-notice" type="button" class="quiet-button">Got it</button>
      </section>

      <form id="clip-form" novalidate>
        <div class="field">
          <label for="source-url">Link</label>
          <div class="url-row">
            <input
              id="source-url"
              name="url"
              type="url"
              inputmode="url"
              autocomplete="off"
              placeholder="https://youtu.be/..."
            />
            <button id="load-preview" class="secondary-button" type="button">
              Preview
            </button>
          </div>
        </div>

        <section id="preview-section" class="preview-section" hidden>
          <webview
            id="preview-player"
            class="preview-player"
            src="plugin:/preview/player.html"
            width="100%"
            height="100%"
            aria-label="YouTube preview"
          ></webview>

          <div class="preview-time-row">
            <output id="preview-current-time">00:00.000</output>
            <output id="preview-total-time">00:00.000</output>
          </div>

          <div id="selection-timeline" class="selection-timeline">
            <div class="selection-track"></div>
            <div id="selection-range" class="selection-range"></div>
            <div id="selection-playhead" class="selection-playhead"></div>
            <input
              id="selection-in-range"
              class="timeline-input"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="0"
              aria-label="In point"
            />
            <input
              id="selection-out-range"
              class="timeline-input"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="1"
              aria-label="Out point"
            />
          </div>

          <div class="preview-controls">
            <button
              id="preview-toggle"
              class="icon-button"
              type="button"
              title="Play or pause"
              aria-label="Play or pause"
            >
              ▶
            </button>
            <button id="mark-in" class="secondary-button" type="button">
              <svg class="mark-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 4v16M8 12h12M16 8l4 4-4 4" />
              </svg>
              <span>Mark In</span>
            </button>
            <button id="mark-out" class="secondary-button" type="button">
              <svg class="mark-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 4v16M4 12h12M12 8l4 4-4 4" />
              </svg>
              <span>Mark Out</span>
            </button>
            <button id="play-selection" class="secondary-button" type="button">
              Play Selection
            </button>
          </div>
        </section>

        <fieldset class="field">
          <legend>Duration</legend>
          <div class="segmented two-columns" role="group" aria-label="Duration">
            <button id="mode-full" class="segment-button is-selected" type="button" aria-pressed="true">
              Full Clip
            </button>
            <button id="mode-segment" class="segment-button" type="button" aria-pressed="false">
              Segment
            </button>
          </div>
        </fieldset>

        <div id="time-fields" class="time-grid" hidden>
          <div class="field">
            <label for="start-time">Start</label>
            <input id="start-time" type="text" inputmode="decimal" placeholder="00:00" />
          </div>
          <div class="field">
            <label for="end-time">End</label>
            <input id="end-time" type="text" inputmode="decimal" placeholder="00:30" />
          </div>
          <div class="field selection-duration-field">
            <label for="selection-duration">Selection</label>
            <output id="selection-duration">00:00.000</output>
          </div>
        </div>

        <fieldset class="field">
          <legend>Output</legend>
          <div class="segmented output-grid" role="group" aria-label="Output type">
            <button
              id="output-video-audio"
              class="segment-button is-selected"
              type="button"
              aria-pressed="true"
            >
              Video + Audio
            </button>
            <button
              id="output-audio-only"
              class="segment-button"
              type="button"
              aria-pressed="false"
            >
              Audio Only
            </button>
            <button
              id="output-video-only"
              class="segment-button"
              type="button"
              aria-pressed="false"
            >
              Video Only
            </button>
          </div>
        </fieldset>

        <div class="field">
          <label for="output-folder">Save to</label>
          <div class="folder-row">
            <input id="output-folder" type="text" readonly placeholder="Choose a folder" />
            <button id="choose-folder" class="secondary-button" type="button">Choose</button>
          </div>
        </div>

        <div id="progress-area" class="progress-area" aria-live="polite">
          <div class="progress-copy">
            <span id="progress-label">Ready</span>
            <span id="progress-value"></span>
          </div>
          <progress id="progress-bar" max="100" value="0"></progress>
          <p id="message" class="message"></p>
        </div>

        <div class="action-row">
          <button id="import-button" class="primary-button" type="submit">
            Download and Import
          </button>
          <button id="cancel-button" class="danger-button" type="button" hidden>
            Cancel
          </button>
        </div>
      </form>
      <footer class="app-footer">
        <span id="app-version">v0.3.0</span>
      </footer>
    </main>
  </body>
</html>
