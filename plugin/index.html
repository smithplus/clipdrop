<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClipDrop</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <main id="app" class="app-shell">
      <header class="app-header">
        <div>
          <h1>ClipDrop</h1>
          <p>Importar desde YouTube</p>
        </div>
        <div class="helper-status" title="Estado de ClipDrop Helper">
          <span id="status-dot" class="status-dot is-checking"></span>
          <span id="helper-label">Comprobando</span>
        </div>
      </header>

      <section id="legal-notice" class="legal-notice" hidden>
        <p>
          Usa esta herramienta sólo con material propio, autorizado o permitido
          legalmente. No evita DRM, pagos ni accesos privados.
        </p>
        <button id="accept-notice" type="button" class="quiet-button">Entendido</button>
      </section>

      <form id="clip-form" novalidate>
        <div class="field">
          <label for="source-url">Enlace</label>
          <div class="url-row">
            <input
              id="source-url"
              name="url"
              type="url"
              inputmode="url"
              autocomplete="off"
              placeholder="https://youtu.be/..."
            />
            <button id="load-preview" class="secondary-button" type="button">
              Preview
            </button>
          </div>
        </div>

        <section id="preview-section" class="preview-section" hidden>
          <webview
            id="preview-player"
            class="preview-player"
            src="plugin:/preview/player.html"
            width="100%"
            height="100%"
            aria-label="Vista previa de YouTube"
          ></webview>

          <div class="preview-time-row">
            <output id="preview-current-time">00:00.000</output>
            <output id="preview-total-time">00:00.000</output>
          </div>

          <div id="selection-timeline" class="selection-timeline">
            <div class="selection-track"></div>
            <div id="selection-range" class="selection-range"></div>
            <div id="selection-playhead" class="selection-playhead"></div>
            <input
              id="selection-in-range"
              class="timeline-input"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="0"
              aria-label="Punto de entrada"
            />
            <input
              id="selection-out-range"
              class="timeline-input"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="1"
              aria-label="Punto de salida"
            />
          </div>

          <div class="preview-controls">
            <button
              id="preview-toggle"
              class="icon-button"
              type="button"
              title="Reproducir o pausar"
              aria-label="Reproducir o pausar"
            >
              ▶
            </button>
            <button id="mark-in" class="secondary-button" type="button">
              Marcar In
            </button>
            <button id="mark-out" class="secondary-button" type="button">
              Marcar Out
            </button>
            <button id="play-selection" class="secondary-button" type="button">
              Reproducir selección
            </button>
          </div>
        </section>

        <fieldset class="field">
          <legend>Duración</legend>
          <div class="segmented two-columns" role="group" aria-label="Duración">
            <button id="mode-full" class="segment-button is-selected" type="button" aria-pressed="true">
              Clip completo
            </button>
            <button id="mode-segment" class="segment-button" type="button" aria-pressed="false">
              Segmento
            </button>
          </div>
        </fieldset>

        <div id="time-fields" class="time-grid" hidden>
          <div class="field">
            <label for="start-time">Inicio</label>
            <input id="start-time" type="text" inputmode="decimal" placeholder="00:00" />
          </div>
          <div class="field">
            <label for="end-time">Final</label>
            <input id="end-time" type="text" inputmode="decimal" placeholder="00:30" />
          </div>
          <div class="field selection-duration-field">
            <label for="selection-duration">Selección</label>
            <output id="selection-duration">00:00.000</output>
          </div>
        </div>

        <fieldset class="field">
          <legend>Salida</legend>
          <div class="segmented output-grid" role="group" aria-label="Tipo de salida">
            <button
              id="output-video-audio"
              class="segment-button is-selected"
              type="button"
              aria-pressed="true"
            >
              Video + audio
            </button>
            <button
              id="output-audio-only"
              class="segment-button"
              type="button"
              aria-pressed="false"
            >
              Sólo audio
            </button>
            <button
              id="output-video-only"
              class="segment-button"
              type="button"
              aria-pressed="false"
            >
              Sólo video
            </button>
          </div>
        </fieldset>

        <div class="field">
          <label for="output-folder">Guardar en</label>
          <div class="folder-row">
            <input id="output-folder" type="text" readonly placeholder="Elige una carpeta" />
            <button id="choose-folder" class="secondary-button" type="button">Elegir</button>
          </div>
        </div>

        <div id="progress-area" class="progress-area" aria-live="polite">
          <div class="progress-copy">
            <span id="progress-label">Listo</span>
            <span id="progress-value"></span>
          </div>
          <progress id="progress-bar" max="100" value="0"></progress>
          <p id="message" class="message"></p>
        </div>

        <div class="action-row">
          <button id="import-button" class="primary-button" type="submit">
            Descargar e importar
          </button>
          <button id="cancel-button" class="danger-button" type="button" hidden>
            Cancelar
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
